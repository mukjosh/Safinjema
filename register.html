<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Register | SaFi Njema</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <img src="image/Safi Njema logo No Background.png" alt="SaFi Njema">
      <h2>Create Account</h2>
      <p class="auth-sub">Join SaFi Njema for easy booking management</p>
    </div>
    <form id="regForm">
      <div class="form-group"><label>Full Name</label><input type="text" id="rName" placeholder="Jane Smith" required></div>
      <div class="form-group"><label>Email Address</label><input type="email" id="rEmail" placeholder="jane@example.com" required></div>
      <div class="form-group"><label>Phone Number</label><input type="tel" id="rPhone" placeholder="+27 71 000 0000" required></div>
      <div class="form-group"><label>Password</label><input type="password" id="rPass" placeholder="Min 6 characters" required></div>
      <div class="form-group"><label>Confirm Password</label><input type="password" id="rPass2" placeholder="Repeat password" required></div>
      <button type="submit" class="form-submit"><i class="fa fa-user-plus"></i> &nbsp;Create Account</button>
      <div class="alert" id="regMsg"></div>
    </form>
    <p class="auth-footer">Already have an account? <a href="login.html">Sign in</a></p>
    <p class="auth-footer" style="margin-top:8px;"><a href="index.html" style="color:var(--muted);"><i class="fa fa-arrow-left"></i> Back to Home</a></p>
  </div>
</div>
<script src="Java.js"></script>
<script>
document.getElementById('regForm').addEventListener('submit',function(e){
  e.preventDefault();
  const msg=document.getElementById('regMsg');
  const p=document.getElementById('rPass').value;
  const p2=document.getElementById('rPass2').value;
  if(p!==p2){msg.textContent='Passwords do not match.';msg.className='alert err';return;}
  if(p.length<6){msg.textContent='Password must be at least 6 characters.';msg.className='alert err';return;}
  msg.textContent='✓ Account created! Redirecting…';msg.className='alert ok';
  setTimeout(()=>window.location.href='login.html',1800);
});
</script>
</body></html>
